<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndieStack Admin | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stats-card { border-radius: 10px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚀 IndieStack Admin</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="table-container shadow-sm">
                    <h3>Global Leaderboard</h3>
                    <p class="text-muted">Live data from PostgreSQL/Redis</p>
                    <table class="table table-hover mt-3">
                        <thead class="table-light">
                            <tr>
                                <th>Rank</th>
                                <th>Player Name</th>
                                <th>Score</th>
                                <th>Level</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for player in players %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td><strong>{{ player.player_name }}</strong></td>
                                <td class="text-primary">{{ player.score }}</td>
                                <td><span class="badge bg-secondary">Lvl {{ player.level }}</span></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
    // Refresh the page every 30 seconds to show the latest scores
    setTimeout(function(){
       location.reload();
    }, 30000);
</script>    
</body>
</html>
